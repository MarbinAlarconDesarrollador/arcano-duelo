<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberCard Duel | PWA</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0c">

    <!-- CSS Estilos -->
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/cartas.css">
    <link rel="stylesheet" href="css/responsive.css">

    <!-- PeerJS CDN -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js" defer></script>

</head>

<body>

    <header>
        <h1>CyberCard Duel</h1>
    </header>

    <main id="game-container">
        <!-- Pantalla de conexión -->
        <section id="lobby">
            <input type="text" id="peer-id-input" placeholder="ID del rival">
            <button id="btn-conectar">Conectar</button>
            <!-- En tu index.html, esto es lo único que necesitas -->
            <div id="mi-id-display">Tu ID: Generando...</div>
        </section>

        <!-- Área de juego -->
        <section id="game-board">
            <div id="player-card-slot"></div>
        </section>

        <button id="btn-iniciar" style="display:none;">Iniciar Partida</button>
    </main>

    <!-- Cargamos el orquestador como módulo -->
    <script type="module" src="js/app.js"></script>

    <!-- Registro de Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('SW registrado', reg))
                    .catch(err => console.error('Error en SW', err));
            });
        }
    </script>
</body>

</html>
